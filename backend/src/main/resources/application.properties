# Database Configuration (XAMPP MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT Configuration
app.jwt.secret=HospitalSystemSecretKey2024VeryLongAndSecureKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.hospital=DEBUG
